networks:
  microservicios-network:
    driver: bridge

volumes:
  postgres_data:

services:
  # ==================== BASE DE DATOS ====================
  postgres:
    image: postgres:15-alpine
    container_name: postgres-microservicios
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: microservicios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservicios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d microservicios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-microservicios
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - microservicios-network

  # ==================== INFRAESTRUCTURA ====================
  config-server:
    build: ./ms-admin-config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - C:/Users/alexg/Documents/config-repo:/config-repo
    environment:
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:///config-repo
      SPRING_PROFILES_ACTIVE: native
    networks:
      - microservicios-network

  eureka-server:
    build: ./ms-admin-registry-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    networks:
      - microservicios-network
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  api-gateway:
    build: ./ms-admin-api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - microservicios-network
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: true
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID: false

  instructor-service:
    build: ./ms-gestion-instructor
    container_name: instructor-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - postgres
    networks:
      - microservicios-network
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: instructor-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

  alumno-service:
    build: ./ms-gestion-alumno
    container_name: alumno-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - postgres
    networks:
      - microservicios-network
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: alumno-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

  taller-service:
    build: ./ms-gestion-taller
    container_name: taller-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - postgres
      - instructor-service
      - alumno-service
    networks:
      - microservicios-network
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: taller-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservicios_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123